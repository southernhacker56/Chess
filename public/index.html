<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1b1f27" />
<title>Chess Together</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- HOME SCREEN -->
<section id="screen-home" class="screen active">
  <div class="brand">
    <div class="brand-crown">&#9812;</div>
    <h1>Chess Together</h1>
    <p class="tagline">Play a live game with a friend on any phone.</p>
  </div>

  <div class="card">
    <label for="name-input">Your name (optional)</label>
    <input id="name-input" type="text" maxlength="20" placeholder="e.g. Alex" autocomplete="off" />

    <button id="btn-create" class="btn btn-primary">Create New Game</button>

    <div class="divider"><span>or join with a code</span></div>

    <div class="join-row">
      <input id="code-input" type="text" maxlength="5" placeholder="ABCDE" autocomplete="off"
             autocapitalize="characters" inputmode="text" />
      <button id="btn-join" class="btn btn-secondary">Join</button>
    </div>
    <p id="home-error" class="error-text"></p>
  </div>
</section>

<!-- LOBBY SCREEN (waiting for opponent) -->
<section id="screen-lobby" class="screen">
  <div class="card lobby-card">
    <h2>Waiting for opponent&hellip;</h2>
    <p class="muted">Share this code or link with your friend</p>
    <div class="room-code" id="lobby-code">-----</div>
    <button id="btn-copy-link" class="btn btn-secondary">Copy Invite Link</button>
    <button id="btn-cancel-lobby" class="btn btn-ghost">Cancel</button>
    <div class="spinner" aria-hidden="true"></div>
  </div>
</section>

<!-- GAME SCREEN -->
<section id="screen-game" class="screen">
  <header class="game-topbar">
    <div class="player-chip" id="chip-opponent">
      <span class="dot" id="dot-opponent"></span>
      <span class="pname" id="name-opponent">Opponent</span>
    </div>
    <div class="room-pill" id="room-pill">#-----</div>
    <button id="btn-menu" class="icon-btn" aria-label="Menu">&#8942;</button>
  </header>

  <div id="status-bar" class="status-bar">Connecting&hellip;</div>

  <div class="board-wrap">
    <div id="board" class="board"></div>
    <div id="promo-picker" class="promo-picker hidden"></div>
  </div>

  <div class="game-bottom">
    <div class="player-chip" id="chip-self">
      <span class="dot" id="dot-self"></span>
      <span class="pname" id="name-self">You</span>
    </div>
    <div class="action-row">
      <button id="btn-draw" class="btn btn-small">Offer Draw</button>
      <button id="btn-resign" class="btn btn-small btn-danger">Resign</button>
      <button id="btn-history" class="btn btn-small">Moves</button>
    </div>
  </div>

  <div id="draw-banner" class="banner hidden">
    <span id="draw-banner-text">Opponent offered a draw.</span>
    <div class="banner-actions">
      <button id="btn-draw-accept" class="btn btn-small btn-primary">Accept</button>
      <button id="btn-draw-decline" class="btn btn-small btn-ghost">Decline</button>
    </div>
  </div>
</section>

<!-- MOVE HISTORY PANEL -->
<aside id="panel-history" class="side-panel hidden">
  <div class="side-panel-head">
    <h3>Move History</h3>
    <button id="btn-history-close" class="icon-btn">&times;</button>
  </div>
  <ol id="history-list" class="history-list"></ol>
</aside>

<!-- GAME OVER MODAL -->
<div id="modal-gameover" class="modal hidden">
  <div class="modal-card">
    <h2 id="gameover-title">Game Over</h2>
    <p id="gameover-detail" class="muted"></p>
    <div class="modal-actions">
      <button id="btn-rematch" class="btn btn-primary">Request Rematch</button>
      <button id="btn-leave" class="btn btn-ghost">Leave Game</button>
    </div>
    <p id="rematch-status" class="muted small"></p>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
